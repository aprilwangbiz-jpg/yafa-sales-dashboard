<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YAFA Sales by Item</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#f7f4ef;color:#1a1a1a;min-height:100vh;padding:48px 56px;}
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px;}
  .brand-line{display:flex;align-items:center;gap:20px;margin-bottom:6px;}
  .brand-rule{width:48px;height:2px;background:#8b6914;}
  h1{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;letter-spacing:-0.01em;color:#1a1a1a;line-height:1;}
  .subtitle{font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:#8b6914;margin-top:10px;font-weight:400;}
  .meta{text-align:right;font-size:0.8rem;color:#888;line-height:1.8;font-weight:300;border-left:1px solid #ddd;padding-left:24px;margin-top:6px;}
  .meta strong{color:#1a1a1a;font-weight:500;}
  .toolbar{display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #e0dbd2;}
  .search-wrap{position:relative;flex:0 0 400px;}
  .search-wrap::before{content:'\2315';position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8b6914;font-size:1.1rem;pointer-events:none;}
  input[type=text]{width:100%;padding:11px 14px 11px 40px;background:#fff;border:1px solid #ddd;border-radius:0;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;font-weight:300;}
  input[type=text]:focus{border-color:#8b6914;}
  input[type=text]::placeholder{color:#bbb;}
  .count{font-size:0.72rem;color:#aaa;letter-spacing:0.12em;text-transform:uppercase;margin-left:auto;}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:0.85rem;}
  thead tr{border-bottom:2px solid #1a1a1a;}
  th{padding:10px 16px 14px;text-align:left;font-weight:500;font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:#888;cursor:pointer;user-select:none;white-space:nowrap;font-family:'DM Sans',sans-serif;background:transparent;}
  th:hover{color:#1a1a1a;}
  th .arr{margin-left:3px;opacity:0.4;}
  td{padding:14px 16px;border-bottom:1px solid #e8e4dc;white-space:nowrap;color:#333;font-weight:300;}
  tr:hover td{background:#f0ebe2;}
  .num{text-align:right;}
  .qty{text-align:right;font-weight:500;color:#1a1a1a;}
  .inv{text-align:right;font-weight:500;color:#2d6a55;}
  .zero{color:#d0cec8!important;font-weight:300!important;}
  .item-code{color:#8b6914;font-size:0.8rem;font-weight:500;letter-spacing:0.05em;}
  .desc-cell{font-weight:400;white-space:normal;max-width:400px;}
  tfoot td{padding:14px 16px;border-top:2px solid #1a1a1a;background:transparent;font-weight:500;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:#1a1a1a;}
  tfoot .qty{color:#1a1a1a;}
  tfoot .inv{color:#2d6a55;}
  #err{color:#8b6914;padding:24px 0;font-size:0.9rem;}
</style>
</head>
<body>
<header>
  <div>
    <div class="brand-line"><div class="brand-rule"></div><h1>YAFA</h1></div>
    <div class="subtitle">Sales by Item &middot; Core Collection</div>
  </div>
  <div class="meta" id="meta">Loading&hellip;</div>
</header>
<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search item or description&hellip;" oninput="filterTable()"/>
  </div>
  <div class="count" id="count"></div>
</div>
<div id="err"></div>
<div class="table-wrap">
<table id="tbl">
<thead><tr>
  <th onclick="sortBy(0)">Item <span class="arr">&#8597;</span></th>
  <th onclick="sortBy(1)">Description <span class="arr">&#8597;</span></th>
  <th onclick="sortBy(2)" class="qty">MTD Qty <span class="arr">&#8597;</span></th>
  <th onclick="sortBy(3)" class="num">MTD Sales <span class="arr">&#8597;</span></th>
  <th onclick="sortBy(4)" class="qty">YTD Qty <span class="arr">&#8597;</span></th>
  <th onclick="sortBy(5)" class="num">YTD Sales <span class="arr">&#8597;</span></th>
  <th onclick="sortBy(6)" class="qty">2025 Qty <span class="arr">&#8597;</span></th>
  <th onclick="sortBy(7)" class="num">2025 Sales <span class="arr">&#8597;</span></th>
  <th onclick="sortBy(8)" class="inv">Inv Qty <span class="arr">&#8597;</span></th>
</tr></thead>
<tbody id="tbody"></tbody>
<tfoot id="tfoot"></tfoot>
</table>
</div>
<script>
let DATA=[],sortCol=0,sortAsc=true,filtered=[];
const fc=v=>v.toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0});
const fq=v=>v.toLocaleString('en-US',{maximumFractionDigits:0});

function render(rows){
  let h='',tmq=0,tma=0,tyq=0,tya=0,t5q=0,t5a=0,tiq=0;
  rows.forEach(function(r){
    tmq+=r.mtd_qty;tma+=r.mtd_amt;tyq+=r.ytd_qty;tya+=r.ytd_amt;
    t5q+=r.y2025_qty;t5a+=r.y2025_amt;tiq+=(r.inv_qty||0);
    h+='<tr>'+
      '<td class="item-code">'+r.item+'</td>'+
      '<td class="desc-cell">'+r.desc+'</td>'+
      '<td class="qty'+(r.mtd_qty===0?' zero':'')+'">'+fq(r.mtd_qty)+'</td>'+
      '<td class="num'+(r.mtd_amt===0?' zero':'')+'">'+fc(r.mtd_amt)+'</td>'+
      '<td class="qty'+(r.ytd_qty===0?' zero':'')+'">'+fq(r.ytd_qty)+'</td>'+
      '<td class="num'+(r.ytd_amt===0?' zero':'')+'">'+fc(r.ytd_amt)+'</td>'+
      '<td class="qty'+(r.y2025_qty===0?' zero':'')+'">'+fq(r.y2025_qty)+'</td>'+
      '<td class="num'+(r.y2025_amt===0?' zero':'')+'">'+fc(r.y2025_amt)+'</td>'+
      '<td class="inv'+((r.inv_qty||0)===0?' zero':'')+'">'+fq(r.inv_qty||0)+'</td>'+
      '</tr>';
  });
  document.getElementById('tbody').innerHTML=h;
  document.getElementById('tfoot').innerHTML=
    '<tr><td colspan="2">Total — '+rows.length+' items</td>'+
    '<td class="qty">'+fq(tmq)+'</td><td class="num">'+fc(tma)+'</td>'+
    '<td class="qty">'+fq(tyq)+'</td><td class="num">'+fc(tya)+'</td>'+
    '<td class="qty">'+fq(t5q)+'</td><td class="num">'+fc(t5a)+'</td>'+
    '<td class="inv">'+fq(tiq)+'</td></tr>';
  document.getElementById('count').textContent=rows.length+' items';
}

function filterTable(){
  var words=document.getElementById('search').value.toLowerCase().split(/\s+/).filter(function(w){return w;});
  filtered=DATA.filter(function(r){
    var hay=(r.item+' '+r.desc).toLowerCase();
    return words.every(function(w){return hay.indexOf(w)>=0;});
  });
  applySort();
}

function sortBy(col){
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}
  applySort();
}

function applySort(){
  var keys=['item','desc','mtd_qty','mtd_amt','ytd_qty','ytd_amt','y2025_qty','y2025_amt','inv_qty'];
  filtered.sort(function(a,b){
    var va=a[keys[sortCol]]||0,vb=b[keys[sortCol]]||0;
    if(typeof va==='string')return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?va-vb:vb-va;
  });
  render(filtered);
}

fetch('dashboard_data.json')
  .then(function(r){return r.json();})
  .then(function(data){
    DATA=data.items||[];
    filtered=DATA.slice();
    document.getElementById('meta').innerHTML=
      'Updated <strong>'+data.updated+'</strong><br>'+
      'MTD: '+data.mtd_start+' &rarr; '+data.mtd_end+'<br>'+
      DATA.length+' core items';
    applySort();
  })
  .catch(function(e){
    document.getElementById('err').textContent=
      'Could not load dashboard_data.json — run fetch_sales.py first. ('+e.message+')';
    document.getElementById('meta').textContent='';
  });
</script>
</body></html>
