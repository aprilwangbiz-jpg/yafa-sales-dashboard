<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YAFA Inventory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Nunito+Sans:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: #f2f2f0;
    color: #1c1c1e;
    min-height: 100vh;
  }

  .page-header {
    background: #22293a;
    padding: 28px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo-block h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: #e8d9b4;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .logo-block .tagline {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #6b7a96;
    margin-top: 5px;
    font-weight: 300;
  }

  .header-meta {
    text-align: right;
    font-size: 0.78rem;
    color: #6b7a96;
    line-height: 1.8;
    font-weight: 300;
  }

  .header-meta strong { color: #e8d9b4; font-weight: 600; }

  .stat-bar {
    background: #2c3549;
    padding: 14px 52px;
    display: flex;
    gap: 48px;
    border-bottom: 1px solid #3a4560;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #6b7a96;
    font-weight: 400;
  }

  .stat-value {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.05rem;
    color: #e8d9b4;
    font-weight: 400;
  }

  .main { padding: 32px 52px 48px; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .search-wrap { position: relative; flex: 0 0 400px; }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: #e8d9b4;
    font-size: 1rem;
    pointer-events: none;
  }

  input[type=text] {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: #22293a;
    border: 1px solid #3a4560;
    border-radius: 3px;
    color: #e8d9b4;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    font-weight: 300;
  }

  input[type=text]:focus { border-color: #e8d9b4; }
  input[type=text]::placeholder { color: #3a4560; }

  .count {
    font-size: 0.72rem;
    color: #999;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: auto;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    background: #fff;
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }

  thead tr { background: #22293a; }

  th {
    padding: 13px 18px;
    text-align: left;
    font-weight: 600;
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #e8d9b4;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-family: 'Nunito Sans', sans-serif;
  }

  th:hover { color: #fff; }
  th .arr { opacity: 0.45; margin-left: 4px; }
  th.grp-start { border-left: 1px solid #3a4560; }

  td {
    padding: 12px 18px;
    border-bottom: 1px solid #f0eeeb;
    white-space: nowrap;
    color: #444;
    font-weight: 300;
  }

  td.desc-cell { white-space: normal; max-width: 520px; }
  td.grp-start { border-left: 1px solid #f0eeeb; }
  tr:hover td { background: #faf8f4; }

  .item-code { font-weight: 600; font-size: 0.8rem; color: #22293a; letter-spacing: 0.04em; }
  .inv { text-align: right; font-weight: 600; color: #5a6e3a; background: #f7fbf3; }
  tr:hover td.inv { background: #eff7e8; }
  .zero { color: #ddd !important; font-weight: 300 !important; }

  tfoot td {
    padding: 13px 18px;
    border-top: 2px solid #22293a;
    background: #22293a;
    font-weight: 600;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #e8d9b4;
  }

  tfoot .inv { color: #b5d48a; background: transparent; }
  tfoot td.grp-start { border-left: 1px solid #3a4560; }

  #err { color: #c9a84c; padding: 24px 0; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="page-header">
  <div class="logo-block">
    <h1>YAFA</h1>
    <div class="tagline">Inventory · On Hand</div>
  </div>
  <div class="header-meta" id="header-meta">Loading&hellip;</div>
</div>

<div class="stat-bar">
  <div class="stat">
    <span class="stat-label">Items</span>
    <span class="stat-value" id="stat-items">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Total On Hand</span>
    <span class="stat-value" id="stat-total">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">In Stock</span>
    <span class="stat-value" id="stat-instock">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Out of Stock</span>
    <span class="stat-value" id="stat-oos">—</span>
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search item or description… (e.g. conklin chrome)" oninput="filterTable()"/>
    </div>
    <div class="count" id="count">—</div>
  </div>

  <div id="err"></div>

  <div class="table-wrap">
  <table id="tbl">
  <thead>
  <tr>
    <th onclick="sortBy(0)">Item <span class="arr">↕</span></th>
    <th onclick="sortBy(1)">Description <span class="arr">↕</span></th>
    <th onclick="sortBy(2)" class="inv grp-start">Inv Qty <span class="arr">↕</span></th>
  </tr>
  </thead>
  <tbody id="tbody"></tbody>
  <tfoot id="tfoot"></tfoot>
  </table>
  </div>
</div>

<script>
let DATA = [], sortCol = 0, sortAsc = true, filtered = [];

const fq = v => v.toLocaleString('en-US', {maximumFractionDigits: 0});

function updateStats(rows) {
  const total   = rows.reduce((s, r) => s + r.inv_qty, 0);
  const instock = rows.filter(r => r.inv_qty > 0).length;
  const oos     = rows.filter(r => r.inv_qty <= 0).length;
  document.getElementById('stat-items').textContent   = rows.length;
  document.getElementById('stat-total').textContent   = fq(total);
  document.getElementById('stat-instock').textContent = instock;
  document.getElementById('stat-oos').textContent     = oos;
  document.getElementById('count').textContent        = rows.length + ' items';
}

function render(rows) {
  let h = '', tiq = 0;
  rows.forEach(r => {
    tiq += r.inv_qty;
    h += `<tr>
      <td class="item-code">${r.item}</td>
      <td class="desc-cell">${r.desc}</td>
      <td class="inv grp-start${r.inv_qty <= 0 ? ' zero' : ''}">${fq(r.inv_qty)}</td>
    </tr>`;
  });
  document.getElementById('tbody').innerHTML = h;
  document.getElementById('tfoot').innerHTML =
    `<tr>
      <td colspan="2">Total — ${rows.length} items</td>
      <td class="inv grp-start">${fq(tiq)}</td>
    </tr>`;
  updateStats(rows);
}

function filterTable() {
  const words = document.getElementById('search').value.toLowerCase().split(/\s+/).filter(w => w);
  filtered = DATA.filter(r => {
    const hay = (r.item + ' ' + r.desc).toLowerCase();
    return words.every(w => hay.includes(w));
  });
  applySort();
}

function sortBy(col) {
  sortCol === col ? sortAsc = !sortAsc : (sortCol = col, sortAsc = true);
  applySort();
}

function applySort() {
  const keys = ['item', 'desc', 'inv_qty'];
  filtered.sort((a, b) => {
    const va = a[keys[sortCol]], vb = b[keys[sortCol]];
    return typeof va === 'string'
      ? (sortAsc ? va.localeCompare(vb) : vb.localeCompare(va))
      : (sortAsc ? va - vb : vb - va);
  });
  render(filtered);
}

fetch('inventory_data.json')
  .then(r => r.json())
  .then(data => {
    DATA     = data.items || [];
    filtered = DATA.slice();
    document.getElementById('header-meta').innerHTML =
      'Updated <strong>' + data.updated + '</strong>';
    applySort();
  })
  .catch(e => {
    document.getElementById('err').textContent =
      'Could not load inventory_data.json — run fetch_inventory.py first. (' + e.message + ')';
    document.getElementById('header-meta').textContent = '';
  });
</script>
</body>
</html>
