<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YAFA Dashboard — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#f7f4ef;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
  .wrapper{display:flex;align-items:center;gap:64px;max-width:1020px;width:100%;}
  .illustration{flex:1;min-width:0;}
  .illustration svg{width:100%;height:auto;display:block;}
  .card{flex:0 0 360px;padding:48px 40px;background:#fff;border-top:3px solid #8b6914;}
  .brand-line{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  .brand-rule{width:36px;height:2px;background:#8b6914;flex-shrink:0;}
  h1{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:#1a1a1a;line-height:1;}
  .subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:#8b6914;margin-top:8px;margin-bottom:36px;font-weight:400;}
  label{display:block;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:#888;margin-bottom:8px;font-weight:500;}
  input[type=password]{width:100%;padding:12px 14px;background:#f7f4ef;border:1px solid #ddd;border-radius:0;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;font-weight:300;}
  input[type=password]:focus{border-color:#8b6914;background:#fff;}
  button{margin-top:20px;width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:0.78rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background 0.2s;}
  button:hover{background:#8b6914;}
  button:disabled{background:#ccc;cursor:default;}
  #err{margin-top:16px;font-size:0.82rem;color:#c0392b;min-height:1.2em;text-align:center;}
  #spinner{display:none;margin-top:16px;text-align:center;font-size:0.78rem;color:#aaa;letter-spacing:0.1em;text-transform:uppercase;}
  @media(max-width:720px){.wrapper{flex-direction:column;gap:32px;}.card{flex:none;width:100%;max-width:380px;}}
</style>
</head>
<body>

    <path d="M 120 120 Q 116 400, 118 828"
          stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- wall right of door -->
    <path d="M 1210 118 Q 1350 116, 1500 120"
          stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 1500 120 Q 1498 400, 1500 828"

    <!-- door top panel -->

          fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- door bottom panel -->

    <!-- keyhole body (circle) -->

          fill="#1a1a1a"/>
    <!-- keyhole slot -->
    <path d="M 1009 416 Q 1007 444, 1020 450 Q 1033 444, 1031 416 Z"

    <!-- door knob -->
    <path d="M 843 494 C 856 494, 865 502, 865 513 C 865 524, 856 532, 843 532 C 830 532, 821 524, 821 513 C 821 502, 830 494, 843 494 Z"
          fill="none" stroke="#1a1a1a" stroke-width="2.5"/>

    <path d="M 530 685
             C 566 685, 586 705, 586 740

             C 494 795, 474 775, 474 740
             C 474 705, 494 685, 530 685 Z"
          fill="#111111" stroke="#111111" stroke-width="1.5"/>
    <!-- eyes — looking right toward door -->
    <circle cx="518" cy="730" r="6" fill="#FFFFFF"/>
    <circle cx="546" cy="728" r="6" fill="#FFFFFF"/>
    <!-- left leg -->
    <path d="M 504 792 Q 498 812, 496 826" stroke="#1a1a1a" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <!-- right leg -->
    <path d="M 554 792 Q 556 812, 558 826" stroke="#1a1a1a" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <!-- left arm (hanging) -->
    <path d="M 476 736 Q 456 756, 452 778" stroke="#1a1a1a" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <!-- right arm — extended upward toward door holding slip -->
    <path d="M 584 728 Q 635 694, 668 668" stroke="#1a1a1a" stroke-width="3.2" fill="none" stroke-linecap="round"/>

    <!-- password slip in Ball's raised hand -->
    <path d="M 665 644 Q 667 638, 728 640 Q 733 643, 730 688 Q 728 693, 665 690 Q 660 688, 663 644 Z"
          fill="#fffef8" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- three lines on slip representing text -->
    <path d="M 672 656 Q 694 654, 720 656" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M 672 666 Q 698 664, 718 666" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M 672 676 Q 692 674, 712 676" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- orange annotation: "password?" with arrow to slip -->
    <text x="342" y="610" font-family="'Caveat','Patrick Hand','Comic Sans MS',cursive"
          font-size="46" fill="#e8862c" transform="rotate(-4 342 610)">password?</text>
    <path d="M 618 608 Q 642 622, 664 642"
          stroke="#e8862c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 664 642 L 650 636 M 664 642 L 658 654"
          stroke="#e8862c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- blue annotation on door panel: "authorized only" -->
    <text x="888" y="316" font-family="'Caveat','Patrick Hand','Comic Sans MS',cursive"
          font-size="32" fill="#2c6fe8" transform="rotate(1.5 888 316)">authorized only</text>
    <!-- small underline under the text -->
    <path d="M 888 322 Q 1010 318, 1130 322"
          stroke="#2c6fe8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  </svg>
  </div>

  <!-- Login card -->
  <div class="card">
    <div class="brand-line"><div class="brand-rule"></div><h1>YAFA</h1></div>
    <div class="subtitle">Sales Dashboard</div>
    <label for="pwd">Password</label>
    <input type="password" id="pwd" autocomplete="current-password" autofocus/>
    <button id="btn" onclick="signIn()">Sign In</button>
    <div id="err"></div>
    <div id="spinner">Verifying&hellip;</div>
  </div>

</div>
<script>
function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}

async function deriveKey(password,salt){
  const km=await crypto.subtle.importKey(
    'raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64(salt),iterations:200000,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
}

async function signIn(){
  const next=new URLSearchParams(location.search).get('next')||'index.html';
  const pwd=document.getElementById('pwd').value;
  if(!pwd){document.getElementById('err').textContent='Please enter the password.';return;}
  document.getElementById('err').textContent='';
  document.getElementById('btn').disabled=true;
  document.getElementById('spinner').style.display='block';
  try{
    const res=await fetch('dashboard_data.json');
    if(!res.ok) throw new Error('Dashboard data not found (HTTP '+res.status+')');
    const blob=await res.json();
    if(!blob.enc){
      sessionStorage.setItem('yafa_pass',pwd);
      location.replace(next);
      return;
    }
    const key=await deriveKey(pwd,blob.salt);
    await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(blob.iv)},key,b64(blob.data));
    sessionStorage.setItem('yafa_pass',pwd);
    location.replace(next);
  }catch(e){
    document.getElementById('btn').disabled=false;
    document.getElementById('spinner').style.display='none';
    if(e.name==='OperationError'||e.message.includes('decrypt')){
      document.getElementById('err').textContent='Incorrect password. Please try again.';
      document.getElementById('pwd').select();
    }else{
      document.getElementById('err').textContent='Could not reach dashboard data: '+e.message;
    }
  }
}

document.getElementById('pwd').addEventListener('keydown',function(e){
  if(e.key==='Enter') signIn();
});
</script>
</body>
</html>
