<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YAFA Dashboard — Sign In</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#f7f4ef;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card{width:100%;max-width:380px;padding:48px 40px;background:#fff;border-top:3px solid #8b6914;}
  .brand-line{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  .brand-rule{width:36px;height:2px;background:#8b6914;flex-shrink:0;}
  h1{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:#1a1a1a;line-height:1;}
  .subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:#8b6914;margin-top:8px;margin-bottom:36px;font-weight:400;}
  label{display:block;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:#888;margin-bottom:8px;font-weight:500;}
  input[type=password]{width:100%;padding:12px 14px;background:#f7f4ef;border:1px solid #ddd;border-radius:0;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;font-weight:300;}
  input[type=password]:focus{border-color:#8b6914;background:#fff;}
  button{margin-top:20px;width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:0.78rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background 0.2s;}
  button:hover{background:#8b6914;}
  button:disabled{background:#ccc;cursor:default;}
  #err{margin-top:16px;font-size:0.82rem;color:#c0392b;min-height:1.2em;text-align:center;}
  #spinner{display:none;margin-top:16px;text-align:center;font-size:0.78rem;color:#aaa;letter-spacing:0.1em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="card">
  <div class="brand-line"><div class="brand-rule"></div><h1>YAFA</h1></div>
  <div class="subtitle">Sales Dashboard</div>
  <label for="pwd">Password</label>
  <input type="password" id="pwd" autocomplete="current-password" autofocus/>
  <button id="btn" onclick="signIn()">Sign In</button>
  <div id="err"></div>
  <div id="spinner">Verifying&hellip;</div>
</div>
<script>
function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}

async function deriveKey(password,salt){
  const km=await crypto.subtle.importKey(
    'raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64(salt),iterations:200000,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
}

async function signIn(){
  const pwd=document.getElementById('pwd').value;
  if(!pwd){document.getElementById('err').textContent='Please enter the password.';return;}
  document.getElementById('err').textContent='';
  document.getElementById('btn').disabled=true;
  document.getElementById('spinner').style.display='block';
  try{
    const res=await fetch('dashboard_data.json');
    if(!res.ok) throw new Error('Dashboard data not found (HTTP '+res.status+')');
    const blob=await res.json();
    if(!blob.enc){
      sessionStorage.setItem('yafa_pass',pwd);
      location.replace('index.html');
      return;
    }
    const key=await deriveKey(pwd,blob.salt);
    await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(blob.iv)},key,b64(blob.data));
    sessionStorage.setItem('yafa_pass',pwd);
    location.replace('index.html');
  }catch(e){
    document.getElementById('btn').disabled=false;
    document.getElementById('spinner').style.display='none';
    if(e.name==='OperationError'||e.message.includes('decrypt')){
      document.getElementById('err').textContent='Incorrect password. Please try again.';
      document.getElementById('pwd').select();
    }else{
      document.getElementById('err').textContent='Could not reach dashboard data: '+e.message;
    }
  }
}

document.getElementById('pwd').addEventListener('keydown',function(e){
  if(e.key==='Enter') signIn();
});
</script>
</body>
</html>
